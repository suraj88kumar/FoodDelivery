<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowFood - Login</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.1);
        }
        .login-btn {
            width: 100%;
            margin-top: 10px;
        }
        .signup-link {
            margin-top: 20px;
            display: block;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .signup-link span {
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="login-container">
        <div class="login-card glass-card">
            <div class="logo" style="justify-content: center; margin-bottom: 20px;">
                <i class="fa-solid fa-utensils"></i>
                <span>GlowFood</span>
            </div>
            <h1>Welcome Back</h1>
            <p>Please enter your details to continue</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="primary-btn login-btn" id="login-submit-btn">Login</button>
            </form>
            
            <a href="#" class="signup-link">Don't have an account? <span>Sign up</span></a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginSubmitBtn = document.getElementById('login-submit-btn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            loginSubmitBtn.textContent = "Logging in...";
            loginSubmitBtn.disabled = true;

            // Simulation fallback for file:// protocol
            if (window.location.protocol === 'file:') {
                setTimeout(() => {
                    alert('🎉 [SIMULATION] Login Successful! Redirecting to menu...');
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    window.location.href = 'main.html';
                }, 1000);
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(response => {
                if (!response.ok) throw new Error('Login failed');
                return response.json();
            })
            .then(data => {
                alert('Login Successful! Redirecting to menu...');
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                window.location.href = 'main.html';
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Login failed. (Make sure backend is running)');
            })
            .finally(() => {
                loginSubmitBtn.textContent = "Login";
                loginSubmitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
