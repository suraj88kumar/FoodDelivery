<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowFood - Welcome</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .welcome-card {
            width: 100%;
            max-width: 600px;
            padding: 50px;
            text-align: center;
        }
        .welcome-card h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
        }
        .welcome-card p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .action-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="main-container">
        <div class="welcome-card glass-card">
            <div class="logo" style="justify-content: center; margin-bottom: 30px; font-size: 2rem;">
                <i class="fa-solid fa-utensils"></i>
                <span>GlowFood</span>
            </div>
            <h1>Welcome to the Future of Food</h1>
            <p>You have successfully logged in. Experience a new era of food delivery with our premium, high-fidelity interface.</p>
            
            <div class="action-btns">
                <button class="primary-btn" onclick="window.location.href='index.html'">Go to Delivery Page</button>
                <button class="glass-btn secondary-btn" onclick="alert('Profile section coming soon!')">View Profile</button>
            </div>
        </div>
    </div>

    <script>
        // Check if logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
